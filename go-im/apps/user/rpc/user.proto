syntax = "proto3";

package user;

option go_package = "./user";

// model
message UserEntity{
  string id = 1;   // 用户ID
  string avatar = 2 ;  // 用户头像
  string nickname = 3;  // 昵称
  string phone = 4; // 手机号码
  int32 status =5 ; // 是否锁住
  int32 sex = 6; // 性别
  string email = 7; // 邮箱
}
// req与resp
message Request{
  string ping = 1;
}
message Response{
  string pong = 1;
}

message LoginReq{
  string phone =1;
  string password = 2;
}

message LoginResp{
  string id = 3;
  string Token = 1;
  int64 expire = 2;
}

message RegisterReq{
  string phone = 1;
  string password = 3;
  string nickname = 2;
  string avatar = 4;
  int32 sex =5;
}

message RegisterResp{
  string Token = 1;
  int64 expire = 2;
}

message GetUserInfoReq{
  string user = 1;
}

message GetUserInfoResp{
  UserEntity user = 1;
}

message FindUserReq{
  string name =1;
  string phone =2;
  repeated string ids =3 ;
}
message FindUserResp{
  repeated UserEntity users = 1;
}

message UpdateUserProfileReq{
  string userId = 1;
  string nickname = 2;
  int32 sex = 3;
  string email = 4;
  string avatar = 5;
}

message UpdateUserProfileResp{
  bool success = 1;
}

message UpdateUserPasswordReq{
  string userId = 1;
  string oldPassword = 2;
  string newPassword = 3;
}

message UpdateUserPasswordResp{
  bool success = 1;
}

service User{
  rpc Ping(Request) returns(Response);
  rpc Login(LoginReq) returns(LoginResp);
  rpc Register(RegisterReq) returns(RegisterResp);
  rpc GetUserInfo(GetUserInfoReq) returns(GetUserInfoResp);
  rpc FindUser(FindUserReq) returns(FindUserResp);
  rpc UpdateUserProfile(UpdateUserProfileReq) returns(UpdateUserProfileResp);
  rpc UpdateUserPassword(UpdateUserPasswordReq) returns(UpdateUserPasswordResp);
}