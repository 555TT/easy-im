services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: etcd
    ports:
      - "3379:2379"
      - "3380:2380"
    environment:
      ETCD_ENABLE_V2: "true"
      ETCD_NAME: etcd
      ETCD_ADVERTISE_CLIENT_URLS: http://192.168.200.129:3379
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_CLUSTER: etcd=http://0.0.0.0:2380
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: easy-im-etcd
      ALLOW_NONE_AUTHENTICATION: "yes"
    volumes:
      - ./components/etcd/data:/etcd-data
    command: >
      /usr/local/bin/etcd
      --data-dir=/etcd-data
    restart: always

  redis:
    image: redis:alpine3.18
    container_name: redis
    ports:
      - "16379:6379"
    volumes:
      - ./components/redis/data:/data
    environment:
      TZ: Asia/Shanghai
    command: redis-server --requirepass easy-chat --appendonly yes
    restart: always

  mysql:
    image: mysql:8.0.34
    container_name: mysql
    ports:
      - "13306:3306"
    volumes:
      - ./components/mysql/data:/var/lib/mysql
      - /etc/localtime:/etc/localtime:ro
    environment:
      MYSQL_ROOT_PASSWORD: easy-chat
    restart: always

  mongo:
    image: mongo:4.0
    container_name: mongo
    ports:
      - "47017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: easy-chat
    volumes:
      - ./components/mongo/data:/data/db
      - /etc/localtime:/etc/localtime:ro
    restart: always

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: jaeger
    ports:
      - "16686:16686"
      - "14268:14268"
    environment:
      TZ: Asia/Shanghai
    restart: always

  zookeeper:
    image: zookeeper:3.9
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOO_4LW_COMMANDS_WHITELIST: "*"
    volumes:
      - ./components/zookeeper/data:/data
      - ./components/zookeeper/datalog:/datalog
    restart: always

  kafka:
    image: bitnamilegacy/kafka:3.7
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_BROKER_ID: "1"
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://192.168.200.129:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CREATE_TOPICS: "MsgChatTransfer:8:1,MsgReadTransfer:8:1"
    depends_on:
      - zookeeper
    volumes:
      - ./components/kafka/data:/bitnami/kafka
    restart: always
